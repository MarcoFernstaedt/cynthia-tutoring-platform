<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" role="img" aria-labelledby="title desc">
  <title id="title">Decorative Saguaro Blossoms flower</title>
  <desc id="desc">Eight organic magenta and bright pink blossom petals around a gold center, matching the Saguaro Blossoms Learning website flower.</desc>
  <rect x="0" y="0" width="320" height="280" fill="none"/>
  <defs>
    <path id="long-petal" d="M160 10 C188 42 190 101 160 140 C130 101 132 42 160 10 Z"/>
    <path id="short-petal" d="M160 26 C184 54 184 105 160 140 C136 105 136 54 160 26 Z"/>
  </defs>
  <g opacity="0.9">
    <use href="#long-petal" fill="#D4006A" transform="rotate(0 160 140)"/>
    <use href="#short-petal" fill="#E8008A" transform="rotate(45 160 140)"/>
    <use href="#long-petal" fill="#D4006A" transform="rotate(90 160 140)"/>
    <use href="#short-petal" fill="#E8008A" transform="rotate(135 160 140)"/>
    <use href="#long-petal" fill="#D4006A" transform="rotate(180 160 140)"/>
    <use href="#short-petal" fill="#E8008A" transform="rotate(225 160 140)"/>
    <use href="#long-petal" fill="#D4006A" transform="rotate(270 160 140)"/>
    <use href="#short-petal" fill="#E8008A" transform="rotate(315 160 140)"/>
  </g>
  <circle cx="160" cy="140" r="38" fill="#D4A017"/>
  <text x="160" y="133" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic">Every</text>
  <text x="160" y="151" text-anchor="middle" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic">voice</text>
</svg>
